# Простой конфиг для connect.mastereducation.kz
# Скопируй это в /etc/nginx/sites-available/connect
# И создай симлинк: sudo ln -s /etc/nginx/sites-available/connect /etc/nginx/sites-enabled/connect

server {
    listen 80;
    server_name connect.mastereducation.kz www.connect.mastereducation.kz;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

