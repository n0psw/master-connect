# MasterConnect API Gateway Configuration
# Добавить в /etc/nginx/sites-enabled/api_gateway.conf
# В секцию server { listen 80; server_name api.mastereducation.kz ... }
# ИЛИ в HTTPS секцию server { listen 443 ssl; server_name api.mastereducation.kz ... }

# --- Connect API ---
location /connect/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # WebSocket support для чата
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Таймауты для long polling и WebSocket
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_buffering off;
    
    # Размер загружаемых файлов
    client_max_body_size 10M;
}

