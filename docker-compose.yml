services:
  postgres:
    image: postgres:15-alpine
    container_name: masterconnect_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-masterconnect}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - masterconnect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: masterconnect_api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - masterconnect
      - proxy
    environment:
      - VIRTUAL_HOST=apiconnect.mastereducation.kz
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=apiconnect.mastereducation.kz
      - LETSENCRYPT_EMAIL=admin@mastereducation.kz
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 300s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8000/ws}
    container_name: masterconnect_web
    ports:
      - "${WEB_PORT:-3000}:80"
    environment:
      - VIRTUAL_HOST=connect.mastereducation.kz
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=connect.mastereducation.kz
      - LETSENCRYPT_EMAIL=admin@mastereducation.kz
    depends_on:
      - api
    networks:
      - masterconnect
      - proxy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  masterconnect:
    driver: bridge
  proxy:
    external: true

