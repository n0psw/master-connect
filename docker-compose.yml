version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: masterconnect_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-masterconnect}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - masterconnect
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: masterconnect_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - masterconnect
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: masterconnect_api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - masterconnect
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8000/ws}
    container_name: masterconnect_web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api
    networks:
      - masterconnect
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: masterconnect_celery
    command: celery -A src.jobs.worker worker --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - masterconnect
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: masterconnect_celery_beat
    command: celery -A src.jobs.worker beat --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - masterconnect
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  masterconnect:
    driver: bridge

